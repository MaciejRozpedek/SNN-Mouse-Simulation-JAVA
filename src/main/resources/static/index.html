<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNN Mouse Simulation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<aside class="sidebar">
    <div class="brand">
        <h1>SNN Mouse</h1>
        <p>Autonomous Agent Sim</p>
    </div>

    <div class="control-panel">
        <button id="toggleBtn" class="btn primary">Start Simulation</button>
        <button id="reloadBtn" class="btn primary">Reload Simulation</button>

        <div class="speed-control" style="color: var(--neon-cyan); font-family: 'Roboto Mono', monospace;">
            <label for="speedRange" style="display: block; margin-bottom: 0.5rem; font-size: 0.8rem;">SPEED x<span id="speedValue">1.0</span></label>
            <input type="range" id="speedRange" min="0.1" max="1.0" step="0.1" value="1.0" style="width: 100%; accent-color: var(--neon-cyan);">
        </div>

        <div class="telemetry">
            <h3>SYSTEM TELEMETRY</h3>
            <div class="telemetry-item">
                <label>COORD_X</label>
                <span id="mouseX">000</span>
            </div>
            <div class="telemetry-item">
                <label>COORD_Y</label>
                <span id="mouseY">000</span>
            </div>
            <div class="telemetry-item">
                <label>TARGETS</label>
                <span id="foodCount">0</span>
            </div>
        </div>
    </div>

    <footer class="sidebar-footer">
        <p>v1.0.0 &bull; Spring Boot</p>
    </footer>
</aside>

<main class="simulation-view">
    <canvas id="simCanvas" width="1000" height="800"></canvas>
</main>

<script src="script.js"></script>
</body>
</html>
