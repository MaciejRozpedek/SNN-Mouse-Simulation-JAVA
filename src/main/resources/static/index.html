<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNN Mouse Simulation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<aside class="sidebar">
    <div class="brand">
        <h1>SNN Mouse</h1>
        <p>Autonomous Agent Sim</p>
    </div>

    <div class="control-panel">
        <button id="toggleBtn" class="btn primary">Start Simulation</button>

        <div class="telemetry">
            <h3>Telemetry</h3>
            <div class="telemetry-item">
                <label>Mouse X</label>
                <span id="mouseX">0</span>
            </div>
            <div class="telemetry-item">
                <label>Mouse Y</label>
                <span id="mouseY">0</span>
            </div>
            <div class="telemetry-item">
                <label>Food Count</label>
                <span id="foodCount">0</span>
            </div>
        </div>
    </div>

    <footer class="sidebar-footer">
        <p>v1.0.0 &bull; Spring Boot</p>
    </footer>
</aside>

<main class="simulation-view">
    <canvas id="simCanvas" width="800" height="600"></canvas>
</main>

<script src="script.js"></script>
</body>
</html>
